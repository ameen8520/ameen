<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF8C00">
    <title>مركز تحفيظ ملعب فلسطين</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="app" class="pb-20 md:pb-0 md:pr-64 min-h-screen">
        <!-- Auth Overlay -->
        <div id="auth-screen" class="fixed inset-0 z-[60] bg-white flex flex-col items-center justify-center p-6 text-center">
            <div class="mb-8">
                <div class="w-32 h-32 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-orange-100 p-2 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/initials/svg?seed=MP&backgroundColor=FF8C00" alt="Logo" class="rounded-full">
                </div>
                <h1 class="text-3xl font-black text-gray-800">تحفيظ ملعب فلسطين</h1>
                <p class="text-gray-500 mt-2">نظام الإدارة الموحد</p>
            </div>
            <div class="w-full max-w-xs space-y-4">
                <input type="password" id="pin-input" maxlength="4" placeholder="••••" 
                    class="w-full text-center text-4xl tracking-widest p-5 border-2 border-orange-100 rounded-3xl focus:border-orange-500 outline-none transition-all shadow-sm">
                <button onclick="handleLogin()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all">دخول النظام</button>
            </div>
        </div>

        <!-- Sidebar (Desktop) -->
        <aside id="sidebar" class="fixed right-0 top-0 h-full w-64 bg-white border-l border-gray-100 hidden md:flex flex-col z-40 shadow-sm">
            <div class="p-6 border-b flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-orange-100 rounded-2xl flex items-center justify-center overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/initials/svg?seed=MP&backgroundColor=FF8C00" alt="Logo">
                </div>
                <h2 class="text-lg font-black text-gray-800">تحفيظ ملعب فلسطين</h2>
            </div>
            <nav class="flex-1 p-4 space-y-1" id="admin-nav"></nav>
            <div class="p-4 border-t">
                <button onclick="logout()" class="flex items-center gap-3 text-red-500 w-full p-4 rounded-2xl hover:bg-red-50 transition-colors font-bold">
                    <i data-lucide="log-out"></i>
                    <span>تسجيل الخروج</span>
                </button>
            </div>
        </aside>

        <!-- Top Header (Mobile) -->
        <header class="md:hidden bg-white border-b p-4 flex items-center justify-between sticky top-0 z-40 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-50 rounded-xl overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/initials/svg?seed=MP&backgroundColor=FF8C00" alt="Logo">
                </div>
                <span class="font-black text-gray-800 tracking-tight">تحفيظ ملعب فلسطين</span>
            </div>
            <button onclick="logout()" class="text-red-500 p-2"><i data-lucide="log-out"></i></button>
        </header>

        <!-- Main Content Area -->
        <main id="view-container" class="p-4 md:p-10 max-w-6xl mx-auto"></main>

        <!-- Mobile Bottom Nav -->
        <nav id="mobile-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-3 md:hidden z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]"></nav>

        <!-- Modal Overlay -->
        <div id="modal-container" class="fixed inset-0 z-[100] bg-black/60 hidden flex items-center justify-center p-4 backdrop-blur-sm">
            <div id="modal-content" class="bg-white rounded-[2rem] w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
